# Pinpoint Workflow Add Or Update Plugin Support

## Action

Follow the add-or-update-plugin-support workflow:
1. Create or update plugin module directories and pom.xml.
2. Add new implementation and configuration files for the new version.
3. Add or update test classes for the new version.
4. Update root or aggregator pom.xml to include the new modules.
5. Update documentation if needed.

