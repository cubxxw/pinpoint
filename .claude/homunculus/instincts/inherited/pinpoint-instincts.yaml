# Pinpoint Workflow Dependency Upgrade Across Multiple Modules

## Action

Follow the dependency-upgrade-across-multiple-modules workflow:
1. Identify the dependency and new version.
2. Update the dependency version in all affected pom.xml files.
3. Update any related test code or configuration if needed.
4. Commit all changes together with a bump message.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: **/pom.xml, **/src/test/java/**/*.java

