# Pinpoint Workflow Bom Unification Or Restructuring

## Action

Follow the bom-unification-or-restructuring workflow:
1. Identify BOM files to unify or restructure.
2. Move or merge dependency declarations into a central BOM.
3. Update module pom.xml files to reference the new BOM.
4. Remove or deprecate old BOM files.
5. Commit all related changes together.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: agent-module/agent-testweb/bom/pom.xml, agent-module/plugins-bom/pom.xml, agent-module/plugins-it/pom.xml

